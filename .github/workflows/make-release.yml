name: Make Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v), optional for manual runs"
        required: false
        type: string

env:
  QT_VERSION: "6.9.0"
  DIST_DIR: "dist/FLiNG Downloader"
  INSTALLER_DIR: "dist/installer"
  APP_SUBDIR: "app"

jobs:
  make-release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtnetworkauth
          cache: true

      - name: Update translations for release
        shell: pwsh
        run: .\build.cmd i18n

      - name: Update vcpkg
        shell: pwsh
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          git pull

      - name: Install build and packaging tools
        shell: pwsh
        run: |
          choco install ninja --no-progress -y
          choco install pkgconfiglite --no-progress -y
          choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
            if ($version.StartsWith("v")) {
              $version = $version.Substring(1)
            }
          } elseif ("${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "0.0.0-dev.${{ github.run_number }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Build release binary
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          .\build.cmd release --app-version "${{ steps.version.outputs.version }}"
        env:
          PKG_CONFIG: C:\ProgramData\chocolatey\bin\pkg-config.exe
          VCPKG_PKGCONFIG: C:\ProgramData\chocolatey\bin\pkg-config.exe

      - name: Prepare Qt runtime package
        id: package
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $distDir = Join-Path $workspace $env:DIST_DIR
          $appDir = Join-Path $distDir $env:APP_SUBDIR
          $exePath = Join-Path $workspace "build\ninja-release\FLiNG Downloader.exe"
          $launcherPath = Join-Path $workspace "build\ninja-release\FLiNG Launcher.exe"
          $qmlSourceDir = Join-Path $workspace "qml"

          if (!(Test-Path $exePath)) {
            throw "Executable not found: $exePath"
          }
          if (!(Test-Path $launcherPath)) {
            throw "Launcher executable not found: $launcherPath"
          }
          if (!(Test-Path $qmlSourceDir)) {
            throw "QML source dir not found: $qmlSourceDir"
          }

          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          New-Item -ItemType Directory -Force -Path $appDir | Out-Null

          $rootLauncherPath = Join-Path $distDir "FLiNG Downloader.exe"
          $appExePath = Join-Path $appDir "FLiNG Downloader.exe"

          Copy-Item -Path $launcherPath -Destination $rootLauncherPath -Force
          Copy-Item -Path $exePath -Destination $appExePath -Force

          & windeployqt.exe --release --compiler-runtime --no-translations --no-opengl-sw --qmldir "$qmlSourceDir" --dir "$appDir" "$appExePath"
          if ($LASTEXITCODE -ne 0) {
            throw "windeployqt failed with exit code $LASTEXITCODE"
          }

          $pluginRoot = $appDir
          $pluginProbeDir = Join-Path $appDir "plugins"
          if (Test-Path $pluginProbeDir) {
            $pluginRoot = $pluginProbeDir
          }

          $sizeBeforeBytes = (Get-ChildItem -Path $distDir -Recurse -File | Measure-Object -Property Length -Sum).Sum

          $qtConfPath = Join-Path $appDir "qt.conf"
          @(
            "[Paths]",
            "Prefix=.",
            "Plugins=.",
            "Qml2Imports=qml",
            "Imports=qml"
          ) | Set-Content -Path $qtConfPath -Encoding Ascii

          $prunePluginDirs = @(
            "generic",
            "networkinformation",
            "sceneparsers",
            "assetimporters",
            "geometryloaders",
            "renderers",
            "iconengines",
            "qmltooling"
          )
          foreach ($relativeDir in $prunePluginDirs) {
            $fullDir = Join-Path $pluginRoot $relativeDir
            if (Test-Path $fullDir) {
              Remove-Item -Path $fullDir -Recurse -Force
            }
          }

          $imageFormatsDir = Join-Path $pluginRoot "imageformats"
          if (Test-Path $imageFormatsDir) {
            Get-ChildItem -Path $imageFormatsDir -File -Filter "*.dll" | Where-Object {
              $_.Name -notin @("qjpeg.dll", "qpng.dll", "qico.dll", "qgif.dll")
            } | Remove-Item -Force
          }

          # Remove unused top-level DLLs (verified by runtime loading analysis)
          $pruneDlls = @(
            "d3dcompiler_47.dll",
            "dxcompiler.dll",
            "dxil.dll",
            "Qt6Svg.dll",
            "Qt6QuickEffects.dll",
            "Qt6QuickShapes.dll",
            "Qt6LabsFolderListModel.dll",
            "Qt6LabsQmlModels.dll",
            "Qt6QuickControls2FluentWinUI3StyleImpl.dll",
            "Qt6QuickControls2Fusion.dll",
            "Qt6QuickControls2FusionStyleImpl.dll",
            "Qt6QuickControls2Imagine.dll",
            "Qt6QuickControls2ImagineStyleImpl.dll",
            "Qt6QuickControls2Material.dll",
            "Qt6QuickControls2MaterialStyleImpl.dll",
            "Qt6QuickControls2Universal.dll",
            "Qt6QuickControls2UniversalStyleImpl.dll",
            "Qt6QuickControls2WindowsStyleImpl.dll"
          )
          foreach ($dll in $pruneDlls) {
            $dllPath = Join-Path $appDir $dll
            if (Test-Path $dllPath) {
              Remove-Item -Path $dllPath -Force
            }
          }

          # Remove unused QML style modules (only Basic + FluentWinUI3 are needed)
          $pruneQmlStyleDirs = @(
            "qml\QtQuick\Controls\Fusion",
            "qml\QtQuick\Controls\Imagine",
            "qml\QtQuick\Controls\Material",
            "qml\QtQuick\Controls\Universal",
            "qml\QtQuick\Controls\Windows",
            "qml\QtQuick\NativeStyle",
            "qml\QtQuick\Effects",
            "qml\QtQuick\Shapes",
            "qml\QtQuick\Particles",
            "qml\QtQuick\LocalStorage",
            "qml\QtQuick\tooling",
            "qml\QtQuick\VectorImage"
          )
          foreach ($relativeDir in $pruneQmlStyleDirs) {
            $fullDir = Join-Path $appDir $relativeDir
            if (Test-Path $fullDir) {
              Remove-Item -Path $fullDir -Recurse -Force
            }
          }

          $requiredQmlModules = @(
            "qml\QtQuick\Window\qmldir",
            "qml\QtQuick\Layouts\qmldir",
            "qml\QtQuick\Dialogs\qmldir",
            "qml\QtQuick\Controls\Basic\qmldir"
          )
          foreach ($relativePath in $requiredQmlModules) {
            $modulePath = Join-Path $appDir $relativePath
            if (!(Test-Path $modulePath)) {
              throw "Missing deployed QML module: $modulePath"
            }
          }

          $requiredRuntimeFiles = @(
            "Qt6Core.dll",
            "Qt6Qml.dll",
            "Qt6Quick.dll"
          )
          foreach ($relativePath in $requiredRuntimeFiles) {
            $runtimePath = Join-Path $appDir $relativePath
            if (!(Test-Path $runtimePath)) {
              throw "Missing deployed runtime file: $runtimePath"
            }
          }

          # Ensure MSVC runtime is present for /MD-built main app.
          # Accept either app-local runtime DLLs or the VC++ redistributable installer.
          $vcruntimeDlls = Get-ChildItem -Path $appDir -File -Filter "vcruntime*.dll" -ErrorAction SilentlyContinue
          $msvcpDlls = Get-ChildItem -Path $appDir -File -Filter "msvcp*.dll" -ErrorAction SilentlyContinue
          $vcRedistInApp = Join-Path $appDir "vc_redist.x64.exe"
          $vcRedistInDist = Join-Path $distDir "vc_redist.x64.exe"

          $hasRuntimeDlls = ($vcruntimeDlls.Count -gt 0 -and $msvcpDlls.Count -gt 0)
          $hasVcRedist = (Test-Path $vcRedistInApp) -or (Test-Path $vcRedistInDist)

          if (-not $hasRuntimeDlls -and -not $hasVcRedist) {
            throw "Missing MSVC runtime deployment in $distDir (expected either vcruntime*.dll + msvcp*.dll in app dir, or vc_redist.x64.exe)"
          }

          if (-not $hasRuntimeDlls -and $hasVcRedist) {
            Write-Warning "MSVC runtime DLLs not found in app dir; relying on vc_redist.x64.exe in package"
          }

          $qwindowsPath = Join-Path (Join-Path $pluginRoot "platforms") "qwindows.dll"
          if (!(Test-Path $qwindowsPath)) {
            throw "Missing deployed runtime file: $qwindowsPath"
          }

          if (!(Test-Path $rootLauncherPath)) {
            throw "Root launcher missing after packaging: $rootLauncherPath"
          }

          Get-ChildItem -Path $distDir -Recurse -File -Include *.pdb,*.ilk,*.exp,*.lib,*.ipdb,*.iobj |
            Remove-Item -Force -ErrorAction SilentlyContinue

          $sizeAfterBytes = (Get-ChildItem -Path $distDir -Recurse -File | Measure-Object -Property Length -Sum).Sum
          if ($null -eq $sizeBeforeBytes) { $sizeBeforeBytes = 0 }
          if ($null -eq $sizeAfterBytes) { $sizeAfterBytes = 0 }

          $sizeBeforeMB = [Math]::Round($sizeBeforeBytes / 1MB, 2)
          $sizeAfterMB = [Math]::Round($sizeAfterBytes / 1MB, 2)
          $sizeSavedMB = [Math]::Round(($sizeBeforeBytes - $sizeAfterBytes) / 1MB, 2)

          "dist_dir=$distDir" >> $env:GITHUB_OUTPUT
          "size_before_mb=$sizeBeforeMB" >> $env:GITHUB_OUTPUT
          "size_after_mb=$sizeAfterMB" >> $env:GITHUB_OUTPUT
          "size_saved_mb=$sizeSavedMB" >> $env:GITHUB_OUTPUT

      - name: Smoke test packaged app startup
        shell: pwsh
        run: |
          $launcherExe = Join-Path "${{ steps.package.outputs.dist_dir }}" "FLiNG Downloader.exe"
          if (!(Test-Path $launcherExe)) {
            throw "Packaged launcher not found: $launcherExe"
          }

          $proc = Start-Process -FilePath $launcherExe -PassThru
          Start-Sleep -Seconds 8

          if ($proc.HasExited) {
            if ($proc.ExitCode -ne 0) {
              throw "Smoke test failed: process exited early with code $($proc.ExitCode)"
            }
          } else {
            Stop-Process -Id $proc.Id -Force
          }

      - name: Publish packaging size report
        shell: pwsh
        run: |
          @"
          ### Packaging Size Report
          - Before prune: ${{ steps.package.outputs.size_before_mb }} MB
          - After prune: ${{ steps.package.outputs.size_after_mb }} MB
          - Saved: ${{ steps.package.outputs.size_saved_mb }} MB
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY

      - name: Create portable release zip
        id: portable
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $distDir = "${{ steps.package.outputs.dist_dir }}"
          $distRootDir = Split-Path -Parent $distDir
          $distTopFolder = Split-Path -Leaf $distDir
          $portableZip = Join-Path $workspace ("dist\FLiNG-Downloader-v{0}-win-x64-portable.zip" -f "${{ steps.version.outputs.version }}")

          if (Test-Path $portableZip) {
            Remove-Item -Force $portableZip
          }

          Push-Location $distRootDir
          try {
            Compress-Archive -Path $distTopFolder -DestinationPath $portableZip -CompressionLevel Optimal
          } finally {
            Pop-Location
          }

          "portable_zip=$portableZip" >> $env:GITHUB_OUTPUT

      - name: Build Inno Setup installer
        id: installer
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $scriptPath = Join-Path $workspace "tools\FLiNG Downloader-Setup.iss"
          $distDir = "${{ steps.package.outputs.dist_dir }}"
          $outputDir = Join-Path $workspace $env:INSTALLER_DIR
          $isccPath = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

          if (!(Test-Path $isccPath)) {
            throw "ISCC not found: $isccPath"
          }

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          & $isccPath "/DSourceRoot=$workspace" "/DDistDir=$distDir" "/DOutputDir=$outputDir" "/DAppVersion=${{ steps.version.outputs.version }}" "$scriptPath"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC failed with exit code $LASTEXITCODE"
          }

          $installerFile = Get-ChildItem -Path $outputDir -File -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $installerFile) {
            throw "No installer generated in $outputDir"
          }

          "installer_exe=$($installerFile.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLiNG-Downloader-Windows-x64-portable
          path: ${{ steps.package.outputs.dist_dir }}
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FLiNG-Downloader-Windows-x64-setup
          path: ${{ steps.installer.outputs.installer_exe }}
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.portable.outputs.portable_zip }}
            ${{ steps.installer.outputs.installer_exe }}
          generate_release_notes: true
