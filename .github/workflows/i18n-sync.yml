name: I18n Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

env:
  QT_VERSION: "6.9.0"

jobs:
  sync-translations:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtnetworkauth
          cache: true

      - name: Update translation files
        shell: pwsh
        run: .\build.cmd i18n

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(i18n): update translation files"
          title: "chore(i18n): sync translation files"
          body: |
            Automated translation sync generated by CI.
          branch: "ci/i18n-sync"
          delete-branch: false
          add-paths: |
            resources/translations/flingdownloader_en_US.ts
            resources/translations/flingdownloader_ja_JP.ts
            resources/translations/flingdownloader_en_US.qm
            resources/translations/flingdownloader_ja_JP.qm
